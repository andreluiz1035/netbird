name: Step 2 - NetBird

on:
  workflow_call:

jobs:
  netbird:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: vm-ip

      - name: Read IP
        run: echo "IP=$(cat 1-infra/ip.txt)" >> $GITHUB_ENV

      - name: Install NetBird
        run: |
          ssh -o StrictHostKeyChecking=no vennecy@$IP << 'EOF'
            sudo apt update
            curl -fsSL https://pkgs.netbird.io/install.sh | bash
            netbird up
          EOF